<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif">
  <!--
    Closed loop, with v1.1.0 + v1.2.0 additions highlighted.
    Honest diagram: shows actual phases, not a marketing abstraction.
  -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c44"/>
    </marker>
  </defs>

  <style>
    .phase { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .phase-new { fill: #fef9e7; stroke: #b7950b; stroke-width: 2; }
    .phase-ci { fill: #fadbd8; stroke: #c44; stroke-width: 2; }
    .label { font-size: 12px; fill: #222; font-weight: 600; }
    .sub { font-size: 10px; fill: #555; }
    .badge { font-size: 9px; fill: #b7950b; font-weight: 700; }
    .badge-red { font-size: 9px; fill: #c44; font-weight: 700; }
    .center { font-size: 13px; fill: #222; font-weight: 700; }
    .arrow { fill: none; stroke: #666; stroke-width: 1.5; }
    .arrow-red { fill: none; stroke: #c44; stroke-width: 2; stroke-dasharray: 4 2; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="center">ai-engineering-harness · closed loop (v1.2.0)</text>

  <!-- Center: evidence gate -->
  <circle cx="400" cy="320" r="55" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="315" text-anchor="middle" class="center">Evidence</text>
  <text x="400" y="330" text-anchor="middle" class="sub">gate</text>

  <!-- Phase nodes, arranged in a circle -->
  <!-- 12 o'clock -->
  <g transform="translate(400, 90)">
    <rect class="phase" x="-70" y="-25" width="140" height="50" rx="6"/>
    <text x="0" y="-5" text-anchor="middle" class="label">Plan</text>
    <text x="0" y="10" text-anchor="middle" class="sub">workflows/01</text>
  </g>

  <!-- 2 o'clock (Branch + Worktree) -->
  <g transform="translate(610, 175)">
    <rect class="phase" x="-70" y="-25" width="140" height="50" rx="6"/>
    <text x="0" y="-5" text-anchor="middle" class="label">Branch + Worktree</text>
    <text x="0" y="10" text-anchor="middle" class="sub">isolation</text>
  </g>

  <!-- 4 o'clock (Implement) -->
  <g transform="translate(610, 410)">
    <rect class="phase-new" x="-80" y="-30" width="160" height="60" rx="6"/>
    <text x="0" y="-10" text-anchor="middle" class="label">Implement</text>
    <text x="0" y="5" text-anchor="middle" class="sub">context-bundle.sh</text>
    <text x="0" y="18" text-anchor="middle" class="badge">v1.2.0</text>
  </g>

  <!-- 6 o'clock (CI gate) -->
  <g transform="translate(400, 510)">
    <rect class="phase-ci" x="-80" y="-25" width="160" height="50" rx="6"/>
    <text x="0" y="-5" text-anchor="middle" class="label">CI gate</text>
    <text x="0" y="10" text-anchor="middle" class="badge-red">v1.0.2 · BLOCK if red</text>
  </g>

  <!-- 8 o'clock (Adversarial Review) -->
  <g transform="translate(190, 410)">
    <rect class="phase" x="-70" y="-25" width="140" height="50" rx="6"/>
    <text x="0" y="-5" text-anchor="middle" class="label">Adversarial Review</text>
    <text x="0" y="10" text-anchor="middle" class="sub">≥2 reviewers</text>
  </g>

  <!-- 10 o'clock (Evidence) -->
  <g transform="translate(190, 175)">
    <rect class="phase-new" x="-80" y="-30" width="160" height="60" rx="6"/>
    <text x="0" y="-10" text-anchor="middle" class="label">Compact Report</text>
    <text x="0" y="5" text-anchor="middle" class="sub">compact-report.sh</text>
    <text x="0" y="18" text-anchor="middle" class="badge">v1.2.0</text>
  </g>

  <!-- Arrows around the loop -->
  <path class="arrow" d="M 470 110 Q 540 130 580 165" marker-end="url(#arr)"/>
  <path class="arrow" d="M 615 205 Q 620 290 615 380" marker-end="url(#arr)"/>
  <path class="arrow" d="M 580 425 Q 540 470 470 495" marker-end="url(#arr)"/>
  <path class="arrow-red" d="M 320 495 Q 280 470 230 425" marker-end="url(#arr-red)"/>
  <text x="280" y="475" class="badge-red">BLOCK ↻ 04-ci-recovery</text>
  <path class="arrow" d="M 185 380 Q 180 290 185 205" marker-end="url(#arr)"/>
  <path class="arrow" d="M 220 160 Q 290 130 330 110" marker-end="url(#arr)"/>

  <!-- Side panel: scripts that aren't in the loop but support it -->
  <g transform="translate(20, 555)">
    <text class="sub">Side scripts (host-level):</text>
    <text x="0" y="14" class="sub">· hooks/session-start-read-session-md.sh + install-session-hook.sh (v1.1.0)</text>
    <text x="0" y="28" class="sub">· scripts/check-templates.sh + scripts/validate-meta.sh (v1.0.3 pre-commit gates)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(560, 555)">
    <rect class="phase" x="0" y="0" width="14" height="10"/>
    <text x="20" y="9" class="sub">stable phase</text>
    <rect class="phase-new" x="100" y="0" width="14" height="10"/>
    <text x="120" y="9" class="sub">new in v1.2.0</text>
    <rect class="phase-ci" x="220" y="0" width="14" height="10"/>
    <text x="240" y="9" class="sub">blocking gate</text>
  </g>
</svg>

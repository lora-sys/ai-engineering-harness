name: deploy-landing-page

on:
  push:
    branches: [main]
    paths:
      - 'examples/landing-page/**'
      - '.github/workflows/deploy-landing-page.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-flight deployment if a new commit comes in.
concurrency:
  group: landing-page
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: examples/landing-page/package-lock.json
      - name: Install deps
        working-directory: examples/landing-page
        run: npm ci
      - name: Build
        working-directory: examples/landing-page
        run: npm run build
      - name: Copy build artifact
        run: |
          mkdir -p _site
          cp -r examples/landing-page/dist/* _site/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
